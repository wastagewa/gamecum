<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>Image Pong{% if collection %} - {{ collection }}{% endif %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/svg+xml"  href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        (function(){var t=null;try{t=localStorage.getItem('imgur.theme')}catch(e){}
        if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}
        if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.documentElement.style.colorScheme='dark';}
        else{document.documentElement.removeAttribute('data-theme');document.documentElement.style.colorScheme='light';}})();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar">
  <div class="navbar-container">
    <a href="/" class="navbar-brand"><i class="fas fa-images"></i><span>ImgurMemory</span></a>
    <div class="navbar-menu">
      <a href="/" class="navbar-link"><i class="fas fa-home"></i> Home</a>
      <div class="navbar-dropdown">
        <button class="navbar-link navbar-dropdown-toggle"><i class="fas fa-folder-open"></i> View Collections <i class="fas fa-caret-down"></i></button>
        <div class="navbar-dropdown-menu" id="collectionsDropdown"></div>
      </div>
      <a href="/tags" class="navbar-link"><i class="fas fa-tags"></i> Browse Tags</a>
      {% if collection %}
      <a href="/collection/{{ collection }}" class="navbar-link"><i class="fas fa-images"></i> Gallery</a>
      <button class="navbar-link" id="gamesMenuBtn"><i class="fas fa-gamepad"></i> Single Player Games</button>
      <button class="navbar-link" id="multiplayerGamesBtn"><i class="fas fa-user-group"></i> Multiplayer Games</button>
      {% endif %}
      <a href="/manage-collections" class="navbar-link"><i class="fas fa-cog"></i> Manage</a>
      <button id="themeToggle" class="navbar-theme-toggle" type="button"><i class="fas fa-moon"></i></button>
    </div>
  </div>
</nav>

<div id="bkContainer">
  <div class="bk-content">

    <div class="bk-title-bar">
      <h1 class="bk-title"><i class="fas fa-table-tennis-paddle-ball"></i> Image Pong</h1>
      <p class="bk-subtitle">Break the tiles to reveal the hidden image — guess it fast for maximum score!</p>
    </div>

    <!-- Stats -->
    <div class="bk-stats">
      <div class="stat-item"><span class="stat-label">Score</span><span class="stat-value" id="bkScore">0</span></div>
      <div class="stat-item"><span class="stat-label">Round</span><span class="stat-value" id="bkRound">0</span></div>
      <div class="stat-item"><span class="stat-label">Lives</span><span class="stat-value" id="bkLives">❤️❤️❤️</span></div>
      <div class="stat-item"><span class="stat-label">Tiles</span><span class="stat-value" id="bkTiles">—</span></div>
    </div>

    <!-- Message -->
    <div id="bkMessage" class="bk-message"></div>

    <!-- Game canvas -->
    <div class="bk-canvas-wrap" id="bkCanvasWrap">
      <canvas id="bkCanvas"></canvas>
    </div>

    <!-- 4 guess options -->
    <div class="bk-options" id="bkOptions"></div>

    <!-- Controls -->
    <div class="bk-controls">
      <button id="startBkBtn"      class="control-btn primary"><i class="fas fa-play"></i> Start Game</button>
      <button id="resetBkBtn"      class="control-btn secondary" style="display:none"><i class="fas fa-redo"></i> Reset</button>
      <button id="fullscreenBkBtn" class="control-btn secondary"><i class="fas fa-expand"></i> Fullscreen</button>
      <button id="backBkBtn"       class="control-btn secondary"><i class="fas fa-arrow-left"></i> Back</button>
    </div>

    <!-- Settings -->
    <div class="bk-settings">
      <div class="settings-group bk-slider-group">
        <label for="bkSpeed">
          Ball speed: <strong id="bkSpeedVal">Normal</strong>
          <span class="slider-sub">(faster = harder)</span>
        </label>
        <input type="range" id="bkSpeed" class="setting-slider" min="1" max="5" step="1" value="2">
        <div class="slider-hints"><span>1 slow</span><span>5 extreme</span></div>
      </div>
      <div class="settings-group">
        <label for="bkGridSize">Grid difficulty:</label>
        <select id="bkGridSize" class="setting-select">
          <option value="8x5">8 × 5 — Easy (40 tiles)</option>
          <option value="10x7" selected>10 × 7 — Medium (70 tiles)</option>
          <option value="12x9">12 × 9 — Hard (108 tiles)</option>
          <option value="14x11">14 × 11 — Brutal (154 tiles)</option>
        </select>
      </div>
      <div class="settings-group">
        <label>Username:</label>
        <input type="text" id="bkUsername" class="setting-input" placeholder="Anonymous" maxlength="20">
      </div>
    </div>

  </div>
</div>

<div id="gamesModal" class="games-modal">
  <div class="games-modal-content">
    <div class="games-modal-header">
      <h2><i class="fas fa-gamepad"></i> Choose a Game</h2>
      <button class="games-modal-close" id="gamesModalClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="games-grid" id="gamesGrid"></div>
  </div>
</div>

<script>const CURRENT_COLLECTION = "{{ collection }}";</script>
<script src="{{ url_for('static', filename='js/navbar-collections.js') }}"></script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/breakout.js') }}"></script>
<script src="{{ url_for('static', filename='js/games-modal.js') }}"></script>
</body>
</html>
