<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>Scratch Card{% if collection %} - {{ collection }}{% endif %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/svg+xml"  href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        (function(){var t=null;try{t=localStorage.getItem('imgur.theme')}catch(e){}
        if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}
        if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.documentElement.style.colorScheme='dark';}
        else{document.documentElement.removeAttribute('data-theme');document.documentElement.style.colorScheme='light';}})();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar">
  <div class="navbar-container">
    <a href="/" class="navbar-brand"><i class="fas fa-images"></i><span>ImgurMemory</span></a>
    <div class="navbar-menu">
      <a href="/" class="navbar-link"><i class="fas fa-home"></i> Home</a>
      <div class="navbar-dropdown">
        <button class="navbar-link navbar-dropdown-toggle"><i class="fas fa-folder-open"></i> View Collections <i class="fas fa-caret-down"></i></button>
        <div class="navbar-dropdown-menu" id="collectionsDropdown"></div>
      </div>
      <a href="/tags" class="navbar-link"><i class="fas fa-tags"></i> Browse Tags</a>
      {% if collection %}
      <a href="/collection/{{ collection }}" class="navbar-link"><i class="fas fa-images"></i> Gallery</a>
      <button class="navbar-link" id="gamesMenuBtn"><i class="fas fa-gamepad"></i> Single Player Games</button>
      <button class="navbar-link" id="multiplayerGamesBtn"><i class="fas fa-user-group"></i> Multiplayer Games</button>
      {% endif %}
      <a href="/manage-collections" class="navbar-link"><i class="fas fa-cog"></i> Manage</a>
      <button id="themeToggle" class="navbar-theme-toggle" type="button"><i class="fas fa-moon"></i></button>
    </div>
  </div>
</nav>

<div id="scratchContainer">
  <div class="scratch-content">

    <div class="scratch-title-bar">
      <h1 class="scratch-title"><i class="fas fa-hand-sparkles"></i> Striptease Scratch Card</h1>
      <p class="scratch-subtitle">Scratch to reveal — identify the image before guessing!</p>
    </div>

    <!-- Stats -->
    <div class="scratch-stats">
      <div class="stat-item"><span class="stat-label">Score</span><span class="stat-value" id="scScore">0</span></div>
      <div class="stat-item"><span class="stat-label">Round</span><span class="stat-value" id="scRound">0</span></div>
      <div class="stat-item"><span class="stat-label">Lives</span><span class="stat-value" id="scLives">❤️❤️❤️</span></div>
      <div class="stat-item"><span class="stat-label">Tiles</span><span class="stat-value" id="scTilesLeft">—</span></div>
    </div>

    <!-- Message -->
    <div id="scMessage" class="scratch-message">
      <p style="color:var(--muted-text);font-style:italic;">Press <strong>Start Game</strong> to begin</p>
    </div>

    <!-- Scratch stage -->
    <div class="scratch-stage-wrap">
      <div class="scratch-stage" id="scStage">
        <img id="scTargetImg" class="scratch-target-img" src="" alt="">
        <div class="scratch-grid" id="scGrid"></div>
      </div>
    </div>

    <!-- 4 option thumbnails -->
    <div class="scratch-options" id="scOptions"></div>

    <!-- Controls -->
    <div class="scratch-controls">
      <button id="startScBtn"      class="control-btn primary"><i class="fas fa-play"></i> Start Game</button>
      <button id="resetScBtn"      class="control-btn secondary" style="display:none;"><i class="fas fa-redo"></i> Reset</button>
      <button id="fullscreenScBtn" class="control-btn secondary"><i class="fas fa-expand"></i> Fullscreen</button>
      <button id="backScBtn"       class="control-btn secondary"><i class="fas fa-arrow-left"></i> Back</button>
    </div>

    <!-- Settings -->
    <div class="scratch-settings">
      <div class="settings-group">
        <label for="scGridSize">Grid size:</label>
        <select id="scGridSize" class="setting-select">
          <option value="4">4×4 (easy)</option>
          <option value="6" selected>6×6 (medium)</option>
          <option value="8">8×8 (hard)</option>
        </select>
      </div>
      <div class="settings-group">
        <label>Username:</label>
        <input type="text" id="scUsername" class="setting-input" placeholder="Anonymous" maxlength="20">
      </div>
    </div>

  </div>
</div>

<div id="gamesModal" class="games-modal">
  <div class="games-modal-content">
    <div class="games-modal-header">
      <h2><i class="fas fa-gamepad"></i> Choose a Game</h2>
      <button class="games-modal-close" id="gamesModalClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="games-grid" id="gamesGrid"></div>
  </div>
</div>

<script>const CURRENT_COLLECTION = "{{ collection }}";</script>
<script src="{{ url_for('static', filename='js/navbar-collections.js') }}"></script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/scratch.js') }}"></script>
<script src="{{ url_for('static', filename='js/games-modal.js') }}"></script>
</body>
</html>
