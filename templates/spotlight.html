<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>Spotlight{% if collection %} - {{ collection }}{% endif %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/svg+xml"  href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        (function(){var t=null;try{t=localStorage.getItem('imgur.theme')}catch(e){}
        if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}
        if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.documentElement.style.colorScheme='dark';}
        else{document.documentElement.removeAttribute('data-theme');document.documentElement.style.colorScheme='light';}})();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar">
  <div class="navbar-container">
    <a href="/" class="navbar-brand"><i class="fas fa-images"></i><span>ImgurMemory</span></a>
    <div class="navbar-menu">
      <a href="/" class="navbar-link"><i class="fas fa-home"></i> Home</a>
      <div class="navbar-dropdown">
        <button class="navbar-link navbar-dropdown-toggle"><i class="fas fa-folder-open"></i> View Collections <i class="fas fa-caret-down"></i></button>
        <div class="navbar-dropdown-menu" id="collectionsDropdown"></div>
      </div>
      <a href="/tags" class="navbar-link"><i class="fas fa-tags"></i> Browse Tags</a>
      {% if collection %}
      <a href="/collection/{{ collection }}" class="navbar-link"><i class="fas fa-images"></i> Gallery</a>
      <button class="navbar-link" id="gamesMenuBtn"><i class="fas fa-gamepad"></i> Games</button>
      {% endif %}
      <a href="/manage-collections" class="navbar-link"><i class="fas fa-cog"></i> Manage</a>
      <button id="themeToggle" class="navbar-theme-toggle" type="button"><i class="fas fa-moon"></i></button>
    </div>
  </div>
</nav>

<div id="spContainer">
  <div class="sp-content">

    <div class="sp-title-bar">
      <h1 class="sp-title"><i class="fas fa-circle-dot"></i> Spotlight</h1>
      <p class="sp-subtitle">A tiny peephole drifts across the hidden image — name it before it's fully exposed!</p>
    </div>

    <div class="sp-stats">
      <div class="stat-item"><span class="stat-label">Score</span><span class="stat-value" id="spScore">0</span></div>
      <div class="stat-item"><span class="stat-label">Round</span><span class="stat-value" id="spRound">0</span></div>
      <div class="stat-item"><span class="stat-label">Lives</span><span class="stat-value" id="spLives">❤️❤️❤️</span></div>
      <div class="stat-item"><span class="stat-label">Bonus</span><span class="stat-value" id="spBonus" style="color:var(--secondary-color)">MAX</span></div>
    </div>

    <div id="spMessage" class="sp-message">
      <p style="color:var(--muted-text);font-style:italic;">Press <strong>Start Game</strong> to begin</p>
    </div>

    <!-- Stage: image + canvas overlay -->
    <div class="sp-stage-wrap">
      <div class="sp-stage" id="spStage">
        <img id="spTargetImg" class="sp-target-img" src="" alt="">
        <canvas id="spCanvas" class="sp-canvas"></canvas>
      </div>
    </div>

    <!-- Exposure bar -->
    <div class="sp-exposure-row">
      <span class="sp-exposure-label"><i class="fas fa-eye"></i> Exposed:</span>
      <div class="sp-exposure-track"><div id="spExposureBar" class="sp-exposure-fill"></div></div>
      <span id="spExposurePct" class="sp-exposure-pct">0%</span>
    </div>

    <!-- 4 option thumbnails -->
    <div class="sp-options" id="spOptions"></div>

    <div class="sp-controls">
      <button id="startSpBtn" class="control-btn primary"><i class="fas fa-play"></i> Start Game</button>
      <button id="resetSpBtn" class="control-btn secondary" style="display:none;"><i class="fas fa-redo"></i> Reset</button>
      <button id="backSpBtn"  class="control-btn secondary"><i class="fas fa-arrow-left"></i> Back</button>
    </div>

    <div class="sp-settings">
      <div class="settings-group">
        <label>Difficulty:</label>
        <select id="spDifficulty" class="setting-select">
          <option value="easy">Easy (fast reveal)</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard (slow reveal)</option>
          <option value="insane">Insane (crawl)</option>
        </select>
      </div>
      <div class="settings-group">
        <label>Options:</label>
        <select id="spNumOptions" class="setting-select">
          <option value="3">3 options</option>
          <option value="4" selected>4 options</option>
          <option value="6">6 options</option>
        </select>
      </div>
      <div class="settings-group">
        <label>Username:</label>
        <input type="text" id="spUsername" class="setting-input" placeholder="Anonymous" maxlength="20">
      </div>
    </div>

  </div>
</div>

<div id="gamesModal" class="games-modal">
  <div class="games-modal-content">
    <div class="games-modal-header">
      <h2><i class="fas fa-gamepad"></i> Choose a Game</h2>
      <button class="games-modal-close" id="gamesModalClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="games-grid" id="gamesGrid"></div>
  </div>
</div>

<script>const CURRENT_COLLECTION = "{{ collection }}";</script>
<script src="{{ url_for('static', filename='js/navbar-collections.js') }}"></script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/spotlight.js') }}"></script>
<script src="{{ url_for('static', filename='js/games-modal.js') }}"></script>
</body>
</html>
