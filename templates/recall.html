<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>Recall Grid{% if collection %} - {{ collection }}{% endif %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16.png') }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        (function(){
            var theme = null;
            try { theme = localStorage.getItem('imgur.theme'); } catch(e) {}
            if(!theme){
                var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                theme = prefersDark ? 'dark' : 'light';
            }
            if(theme === 'dark'){
                document.documentElement.setAttribute('data-theme','dark');
                document.documentElement.style.colorScheme = 'dark';
            } else {
                document.documentElement.removeAttribute('data-theme');
                document.documentElement.style.colorScheme = 'light';
            }
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .recall-shell { max-width: 1200px; margin: 0 auto; padding: 24px; --recall-tile-size: 150px; --recall-focus-size: 240px; }
        .recall-shell.fullscreen { max-width: none; min-height: 100vh; padding: 20px; }
        .recall-header { text-align: center; margin-bottom: 20px; }
        .recall-header p { color: var(--muted-text); margin-top: 8px; }
        .recall-toolbar, .recall-stats { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: center; margin-bottom: 16px; }
        .recall-panel { background: var(--surface-color); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 20px; box-shadow: 0 14px 34px rgba(0,0,0,0.18); }
        .recall-board { display: grid; gap: 14px; justify-content: center; }
        .recall-card { width: var(--recall-tile-size); height: var(--recall-tile-size); border-radius: 16px; overflow: hidden; border: 2px solid transparent; background: rgba(255,255,255,0.06); position: relative; cursor: pointer; transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease; }
        .recall-card:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(0,0,0,0.18); }
        .recall-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .recall-card.hidden { display: flex; align-items: center; justify-content: center; color: var(--muted-text); font-size: 1.6rem; font-weight: 700; background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(0,0,0,0.12)); }
        .recall-card.correct { border-color: #2ecc71; box-shadow: 0 0 0 4px rgba(46,204,113,0.18); }
        .recall-card.wrong { border-color: #ff6b81; box-shadow: 0 0 0 4px rgba(255,107,129,0.2); }
        .recall-focus { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 18px; }
        .recall-focus img { width: min(var(--recall-focus-size), 80vw); aspect-ratio: 1 / 1; object-fit: cover; border-radius: 18px; border: 3px solid rgba(255,255,255,0.12); }
        .recall-message { min-height: 28px; text-align: center; font-weight: 600; color: var(--text-color); margin-bottom: 18px; }
        .recall-select, .recall-input { padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.16); background: var(--surface-color); color: var(--text-color); }
        .recall-range-wrap { display: flex; align-items: center; gap: 8px; }
        .recall-range-wrap input[type="range"] { width: 120px; }
        @media (max-width: 640px) {
            .recall-shell { padding: 16px; }
            .recall-range-wrap input[type="range"] { width: 90px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-brand">
                <i class="fas fa-images"></i>
                <span>ImgurMemory</span>
            </a>
            <div class="navbar-menu">
                <a href="/" class="navbar-link"><i class="fas fa-home"></i> Home</a>
                <div class="navbar-dropdown">
                    <button class="navbar-link navbar-dropdown-toggle"><i class="fas fa-folder-open"></i> View Collections <i class="fas fa-caret-down"></i></button>
                    <div class="navbar-dropdown-menu" id="collectionsDropdown"></div>
                </div>
                <a href="/tags" class="navbar-link"><i class="fas fa-tags"></i> Browse Tags</a>
                {% if collection %}
                <a href="/collection/{{ collection }}" class="navbar-link"><i class="fas fa-images"></i> Gallery</a>
                <button class="navbar-link" id="gamesMenuBtn"><i class="fas fa-gamepad"></i> Games</button>
                {% endif %}
                <button id="themeToggle" class="navbar-theme-toggle" type="button"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <main class="recall-shell">
        <header class="recall-header">
            <h1><i class="fas fa-location-dot"></i> Recall Grid</h1>
            <p>Memorize where each collection image appears, then click the original spot of the target image.</p>
        </header>

        <div class="recall-toolbar">
            <label>Grid
                <select id="recallGridSize" class="recall-select">
                    <option value="4">2x2</option>
                    <option value="6" selected>2x3</option>
                    <option value="9">3x3</option>
                </select>
            </label>
            <label>Preview
                <select id="recallPreview" class="recall-select">
                    <option value="2500">Quick</option>
                    <option value="4000" selected>Normal</option>
                    <option value="6000">Relaxed</option>
                </select>
            </label>
            <label>Player
                <input id="recallUsername" class="recall-input" type="text" maxlength="30" placeholder="Anonymous">
            </label>
            <label class="recall-range-wrap">Board
                <input id="recallTileSize" type="range" min="80" max="240" step="10" value="150">
                <span id="recallTileSizeLabel">150px</span>
            </label>
            <label class="recall-range-wrap">Target
                <input id="recallFocusSize" type="range" min="140" max="360" step="10" value="240">
                <span id="recallFocusSizeLabel">240px</span>
            </label>
            <button id="startRecallBtn" class="btn btn-primary"><i class="fas fa-play"></i> Start</button>
            <button id="resetRecallBtn" class="btn btn-secondary"><i class="fas fa-redo"></i> Reset</button>
            <button id="fullscreenRecallBtn" class="btn btn-secondary"><i class="fas fa-expand"></i> Fullscreen</button>
            <button id="backRecallBtn" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</button>
        </div>

        <section class="recall-panel">
            <div class="recall-stats">
                <div class="stat-item"><span class="stat-label">Score:</span> <span id="recallScore" class="stat-value">0</span></div>
                <div class="stat-item"><span class="stat-label">Round:</span> <span id="recallRound" class="stat-value">0</span></div>
                <div class="stat-item"><span class="stat-label">Time:</span> <span id="recallTime" class="stat-value">0:00</span></div>
                <div class="stat-item"><span class="stat-label">State:</span> <span id="recallState" class="stat-value">Waiting</span></div>
            </div>

            <div class="recall-focus">
                <span id="recallTargetLabel">Press Start to begin</span>
                <img id="recallTargetImage" alt="Target image" style="display:none;">
            </div>

            <div id="recallMessage" class="recall-message"></div>
            <div id="recallBoard" class="recall-board"></div>
        </section>
    </main>

    <script>
        const RECALL_IMAGES = {{ images | tojson | safe }};
        const CURRENT_COLLECTION = "{{ collection }}";
    </script>
    <script src="{{ url_for('static', filename='js/navbar-collections.js') }}"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/recall.js') }}"></script>

    <div id="gamesModal" class="games-modal">
        <div class="games-modal-content">
            <div class="games-modal-header">
                <h2><i class="fas fa-gamepad"></i> Choose a Game</h2>
                <button class="games-modal-close" id="gamesModalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="games-grid" id="gamesGrid"></div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/games-modal.js') }}"></script>
</body>
</html>
