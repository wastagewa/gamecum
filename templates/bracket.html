<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>Hot Bracket{% if collection %} - {{ collection }}{% endif %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/svg+xml"  href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        (function(){var t=null;try{t=localStorage.getItem('imgur.theme')}catch(e){}
        if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}
        if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.documentElement.style.colorScheme='dark';}
        else{document.documentElement.removeAttribute('data-theme');document.documentElement.style.colorScheme='light';}})();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar">
  <div class="navbar-container">
    <a href="/" class="navbar-brand"><i class="fas fa-images"></i><span>ImgurMemory</span></a>
    <div class="navbar-menu">
      <a href="/" class="navbar-link"><i class="fas fa-home"></i> Home</a>
      <div class="navbar-dropdown">
        <button class="navbar-link navbar-dropdown-toggle"><i class="fas fa-folder-open"></i> View Collections <i class="fas fa-caret-down"></i></button>
        <div class="navbar-dropdown-menu" id="collectionsDropdown"></div>
      </div>
      <a href="/tags" class="navbar-link"><i class="fas fa-tags"></i> Browse Tags</a>
      {% if collection %}
      <a href="/collection/{{ collection }}" class="navbar-link"><i class="fas fa-images"></i> Gallery</a>
      <button class="navbar-link" id="gamesMenuBtn"><i class="fas fa-gamepad"></i> Games</button>
      {% endif %}
      <a href="/manage-collections" class="navbar-link"><i class="fas fa-cog"></i> Manage</a>
      <button id="themeToggle" class="navbar-theme-toggle" type="button"><i class="fas fa-moon"></i></button>
    </div>
  </div>
</nav>

<div id="bracketContainer">
  <div class="bracket-content">

    <div class="bracket-title-bar">
      <h1 class="bracket-title"><i class="fas fa-fire"></i> Hot Bracket</h1>
      <p class="bracket-subtitle">Click your favourite — the hottest image wins the crown!</p>
    </div>

    <!-- Stats -->
    <div class="bracket-stats">
      <div class="stat-item"><span class="stat-label">Round</span><span class="stat-value" id="brRound">0</span></div>
      <div class="stat-item"><span class="stat-label">Total</span><span class="stat-value" id="brTotal">—</span></div>
      <div class="stat-item"><span class="stat-label">Matchups</span><span class="stat-value" id="brMatchups">0</span></div>
    </div>

    <!-- Message -->
    <div id="brMessage" class="bracket-message">
      <p style="color:var(--muted-text);font-style:italic;">Press <strong>Start Game</strong> to begin</p>
    </div>

    <!-- Arena: two images side-by-side -->
    <div class="bracket-arena" id="brArena">
      <div class="bracket-card" id="brCardA">
        <img id="brImgA" src="" alt="Option A">
        <div class="bracket-card-label">← Click to Vote</div>
      </div>
      <div class="bracket-vs">VS</div>
      <div class="bracket-card" id="brCardB">
        <img id="brImgB" src="" alt="Option B">
        <div class="bracket-card-label">Click to Vote →</div>
      </div>
    </div>

    <!-- Leaderboard -->
    <div class="bracket-leaderboard" id="brLeaderboard" style="display:none;">
      <h3 class="bracket-lb-title"><i class="fas fa-trophy"></i> Top 5 Leaderboard</h3>
      <ol class="bracket-lb-list" id="brLbList"></ol>
    </div>

    <!-- Controls -->
    <div class="bracket-controls">
      <button id="startBrBtn"      class="control-btn primary"><i class="fas fa-play"></i> Start Game</button>
      <button id="resetBrBtn"      class="control-btn secondary" style="display:none;"><i class="fas fa-redo"></i> Reset</button>
      <button id="fullscreenBrBtn" class="control-btn secondary"><i class="fas fa-expand"></i> Fullscreen</button>
      <button id="backBrBtn"       class="control-btn secondary"><i class="fas fa-arrow-left"></i> Back</button>
    </div>

    <!-- Settings -->
    <div class="bracket-settings">
      <div class="settings-group">
        <label for="brRounds">Rounds:</label>
        <select id="brRounds" class="setting-select">
          <option value="10">10 rounds</option>
          <option value="25" selected>25 rounds</option>
          <option value="50">50 rounds</option>
          <option value="0">Unlimited</option>
        </select>
      </div>
      <div class="settings-group">
        <label>Username:</label>
        <input type="text" id="brUsername" class="setting-input" placeholder="Anonymous" maxlength="20">
      </div>
    </div>

  </div>
</div>

<div id="gamesModal" class="games-modal">
  <div class="games-modal-content">
    <div class="games-modal-header">
      <h2><i class="fas fa-gamepad"></i> Choose a Game</h2>
      <button class="games-modal-close" id="gamesModalClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="games-grid" id="gamesGrid"></div>
  </div>
</div>

<script>const CURRENT_COLLECTION = "{{ collection }}";</script>
<script src="{{ url_for('static', filename='js/navbar-collections.js') }}"></script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/bracket.js') }}"></script>
<script src="{{ url_for('static', filename='js/games-modal.js') }}"></script>
</body>
</html>
