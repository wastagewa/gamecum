<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>Tag Match{% if collection %} - {{ collection }}{% endif %}</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16.png') }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.png') }}">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        // Apply saved or system theme ASAP to prevent light-mode flash
        (function(){
            var theme = null;
            try { theme = localStorage.getItem('imgur.theme'); } catch(e) {}
            if(!theme){
                var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                theme = prefersDark ? 'dark' : 'light';
            }
            if(theme === 'dark'){
                document.documentElement.setAttribute('data-theme','dark');
                document.documentElement.style.colorScheme = 'dark';
            } else {
                document.documentElement.removeAttribute('data-theme');
                document.documentElement.style.colorScheme = 'light';
            }
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .tag-match-shell {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            box-sizing: border-box;
        }

        .tag-match-shell.fullscreen {
            max-width: none;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .tag-match-shell.fullscreen .tag-match-header {
            margin-bottom: 16px;
        }

        .tag-match-shell.fullscreen .tag-match-controls {
            margin-bottom: 16px;
        }

        .tag-match-shell.fullscreen .tag-match-board {
            flex: 1;
            margin-bottom: 16px;
        }

        .tag-match-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .tag-match-header h1 {
            margin: 0;
            color: var(--text-color);
        }

        .tag-match-header p {
            color: var(--muted-text);
            margin-top: 8px;
        }

        .tag-match-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }

        .tag-match-control {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--surface-color);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
        }

        .tag-match-control label {
            font-size: 0.9rem;
            color: var(--text-color);
            margin: 0;
        }

        .tag-match-control select {
            padding: 6px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.16);
            background: var(--surface-color);
            color: var(--text-color);
            cursor: pointer;
        }

        .tag-match-control input[type="text"],
        .tag-match-control input[type="number"] {
            padding: 6px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.16);
            background: var(--surface-color);
            color: var(--text-color);
            font-size: 0.9rem;
        }

        .tag-match-control input[type="text"]:focus,
        .tag-match-control input[type="number"]:focus {
            outline: none;
            border-color: rgba(255,255,255,0.32);
            box-shadow: 0 0 0 2px rgba(66, 153, 225, 0.2);
        }

        #fullscreenBtn {
            padding: 8px 12px !important;
            border-radius: 8px;
            background: var(--surface-color);
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #fullscreenBtn:hover {
            background: rgba(66, 153, 225, 0.2);
            border-color: rgba(66, 153, 225, 0.5);
            transform: translateY(-2px);
        }

        .tag-match-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .tag-match-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tag-match-stat-label {
            font-size: 0.85rem;
            color: var(--muted-text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tag-match-stat-value {
            font-size: 1.8rem;
            color: var(--accent-color, #4299e1);
        }

        .tag-match-board {
            display: grid;
            gap: 12px;
            margin-bottom: 24px;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }

        .tag-match-card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, rgba(66, 153, 225, 0.1), rgba(56, 178, 172, 0.1));
            border: 2px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-weight: 600;
            font-size: 0.9rem;
            text-align: center;
            padding: 8px;
            color: var(--text-color);
        }

        .tag-match-card:hover:not(.matched):not(.flipped) {
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.24);
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .tag-match-card.flipped {
            background: linear-gradient(135deg, rgba(66, 153, 225, 0.2), rgba(56, 178, 172, 0.2));
            border-color: rgba(255,255,255,0.24);
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.3);
        }

        .tag-match-card.matched {
            background: linear-gradient(135deg, rgba(46, 204, 113, 0.2), rgba(52, 211, 153, 0.2));
            border-color: #2ecc71;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.2);
        }

        .tag-match-card.incorrect {
            animation: shake 0.4s ease;
        }

        .tag-match-card-content {
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .tag-match-card.flipped .tag-match-card-content,
        .tag-match-card.matched .tag-match-card-content {
            opacity: 1;
        }

        .tag-match-card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Image display modes */
        .tag-match-board.display-fit .tag-match-card-image {
            object-fit: contain;
        }

        .tag-match-board.display-stretch .tag-match-card-image {
            object-fit: fill;
        }

        .tag-match-board.display-full .tag-match-card-image {
            object-fit: cover;
        }

        .tag-match-card.flipped .tag-match-card-image,
        .tag-match-card.matched .tag-match-card-image {
            opacity: 1;
        }

        .tag-match-card-text {
            z-index: 2;
        }

        .tag-match-card-icon {
            font-size: 1.2rem;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .tag-match-end-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .tag-match-end-screen.show {
            display: flex;
        }

        .tag-match-end-modal {
            background: var(--surface-color);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .tag-match-end-modal h2 {
            margin: 0 0 16px;
            color: #2ecc71;
            font-size: 2rem;
        }

        .tag-match-end-modal p {
            color: var(--muted-text);
            margin: 8px 0;
        }

        .tag-match-end-stats {
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px;
            margin: 20px 0;
            text-align: left;
        }

        .tag-match-end-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .tag-match-end-stat:last-child {
            border-bottom: none;
        }

        .tag-match-end-stat-label {
            color: var(--muted-text);
        }

        .tag-match-end-stat-value {
            font-weight: 600;
            color: var(--text-color);
        }

        .tag-match-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .tag-match-button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .tag-match-button-primary {
            background: #4299e1;
            color: white;
        }

        .tag-match-button-primary:hover {
            background: #3182ce;
            transform: translateY(-2px);
        }

        .tag-match-button-secondary {
            background: rgba(255,255,255,0.1);
            color: var(--text-color);
            border: 1px solid rgba(255,255,255,0.16);
        }

        .tag-match-button-secondary:hover {
            background: rgba(255,255,255,0.15);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Fullscreen styling */
        .tag-match-shell.fullscreen {
            background: var(--bg-color);
        }

        .tag-match-shell.fullscreen .navbar {
            display: none;
        }

        .tag-match-shell.fullscreen .tag-match-header {
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        .tag-match-shell.fullscreen .tag-match-header h1 {
            font-size: 1.5rem;
        }

        .tag-match-shell.fullscreen .tag-match-controls {
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .tag-match-shell.fullscreen .tag-match-board {
            flex: 1;
            max-width: 100%;
        }

        #fullscreenBtn.fullscreen-active {
            background: rgba(46, 204, 113, 0.2);
            border-color: #2ecc71;
        }

        @media (max-width: 768px) {
            .tag-match-shell {
                padding: 16px;
            }

            .tag-match-board {
                gap: 10px;
                grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            }

            .tag-match-controls {
                flex-direction: column;
                align-items: stretch;
            }

            .tag-match-control {
                flex-direction: column;
            }

            .tag-match-end-modal {
                padding: 24px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-brand">
                <i class="fas fa-images"></i>
                <span>ImgurMemory</span>
            </a>
            <div class="navbar-menu">
                <a href="/" class="navbar-link"><i class="fas fa-home"></i> Home</a>
                <div class="navbar-dropdown">
                    <button class="navbar-link navbar-dropdown-toggle"><i class="fas fa-folder-open"></i> View Collections <i class="fas fa-caret-down"></i></button>
                    <div class="navbar-dropdown-menu" id="collectionsDropdown">
                        <!-- Collections will be loaded dynamically -->
                    </div>
                </div>
                <a href="/tags" class="navbar-link"><i class="fas fa-tags"></i> Browse Tags</a>
                {% if collection %}
                <a href="/collection/{{ collection }}" class="navbar-link"><i class="fas fa-images"></i> Gallery</a>
                <button class="navbar-link" id="gamesMenuBtn"><i class="fas fa-gamepad"></i> Games</button>
                {% endif %}
                <a href="/manage-collections" class="navbar-link"><i class="fas fa-cog"></i> Manage</a>
                <button id="themeToggle" class="navbar-theme-toggle" type="button">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="tag-match-shell">
        <header class="tag-match-header">
            <h1><i class="fas fa-tag"></i> Tag Match Memory</h1>
            <p>Match tag cards with images that contain those tags!</p>
        </header>

        <div class="tag-match-controls">
            <div class="tag-match-control">
                <label for="difficultySelect">Difficulty:</label>
                <select id="difficultySelect">
                    <option value="easy">Easy (4 pairs)</option>
                    <option value="medium" selected>Medium (6 pairs)</option>
                    <option value="hard">Hard (8 pairs)</option>
                    <option value="insane">Insane (10 pairs)</option>
                    <option value="custom">Custom Pairs</option>
                </select>
            </div>

            <div class="tag-match-control" id="customPairsControl" style="display: none;">
                <label for="customPairsInput">Pairs:</label>
                <input type="number" id="customPairsInput" min="2" max="20" value="6" placeholder="6">
            </div>

            <div class="tag-match-control">
                <label for="cardSizeInput">Card Size (px):</label>
                <input type="number" id="cardSizeInput" min="60" max="300" value="100" placeholder="100">
            </div>

            <div class="tag-match-control">
                <label for="displayModeSelect">Image Mode:</label>
                <select id="displayModeSelect">
                    <option value="full" selected>Full (Cover)</option>
                    <option value="fit">Fit (Contain)</option>
                    <option value="stretch">Stretch (Fill)</option>
                </select>
            </div>

            <div class="tag-match-control">
                <label for="usernameInput">Username:</label>
                <input type="text" id="usernameInput" placeholder="Enter username" style="padding: 6px 8px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.16); background: var(--surface-color); color: var(--text-color); width: 140px;">
            </div>

            <button id="fullscreenBtn" class="btn" style="padding: 8px 12px; border-radius: 8px;" title="Enter fullscreen mode">
                <i class="fas fa-expand"></i>
            </button>

            <button id="newGameBtn" class="btn" style="padding: 8px 16px; border-radius: 8px;">
                <i class="fas fa-redo"></i> New Game
            </button>
        </div>

        <div class="tag-match-stats">
            <div class="tag-match-stat">
                <div class="tag-match-stat-label">Time</div>
                <div class="tag-match-stat-value" id="timeDisplay">0:00</div>
            </div>
            <div class="tag-match-stat">
                <div class="tag-match-stat-label">Moves</div>
                <div class="tag-match-stat-value" id="movesDisplay">0</div>
            </div>
            <div class="tag-match-stat">
                <div class="tag-match-stat-label">Matched</div>
                <div class="tag-match-stat-value" id="matchedDisplay">0/0</div>
            </div>
        </div>

        <div class="tag-match-board" id="gameBoard"></div>
    </main>

    <div class="tag-match-end-screen" id="endScreen">
        <div class="tag-match-end-modal">
            <h2>🎉 You Won!</h2>
            <div class="tag-match-end-stats">
                <div class="tag-match-end-stat">
                    <span class="tag-match-end-stat-label">Final Time</span>
                    <span class="tag-match-end-stat-value" id="finalTime">0:00</span>
                </div>
                <div class="tag-match-end-stat">
                    <span class="tag-match-end-stat-label">Total Moves</span>
                    <span class="tag-match-end-stat-value" id="finalMoves">0</span>
                </div>
                <div class="tag-match-end-stat">
                    <span class="tag-match-end-stat-label">Pairs Matched</span>
                    <span class="tag-match-end-stat-value" id="finalPairs">0/0</span>
                </div>
                <div class="tag-match-end-stat">
                    <span class="tag-match-end-stat-label">Score</span>
                    <span class="tag-match-end-stat-value" id="finalScore">0</span>
                </div>
            </div>
            <div class="tag-match-buttons">
                <button class="tag-match-button tag-match-button-primary" id="submitScoreBtn">
                    <i class="fas fa-check"></i> Submit Score
                </button>
                <button class="tag-match-button tag-match-button-secondary" id="playAgainBtn">
                    <i class="fas fa-redo"></i> Play Again
                </button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/tag-match.js') }}"></script>
</body>
</html>
