<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>Orbiting Vault{% if collection %} - {{ collection }}{% endif %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/svg+xml"  href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        (function(){var t=null;try{t=localStorage.getItem('imgur.theme')}catch(e){}
        if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}
        if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.documentElement.style.colorScheme='dark';}
        else{document.documentElement.removeAttribute('data-theme');document.documentElement.style.colorScheme='light';}})();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Three.js r134 — stable global THREE object -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>
<body>
<nav class="navbar">
  <div class="navbar-container">
    <a href="/" class="navbar-brand"><i class="fas fa-images"></i><span>ImgurMemory</span></a>
    <div class="navbar-menu">
      <a href="/" class="navbar-link"><i class="fas fa-home"></i> Home</a>
      <div class="navbar-dropdown">
        <button class="navbar-link navbar-dropdown-toggle"><i class="fas fa-folder-open"></i> View Collections <i class="fas fa-caret-down"></i></button>
        <div class="navbar-dropdown-menu" id="collectionsDropdown"></div>
      </div>
      <a href="/tags" class="navbar-link"><i class="fas fa-tags"></i> Browse Tags</a>
      {% if collection %}
      <a href="/collection/{{ collection }}" class="navbar-link"><i class="fas fa-images"></i> Gallery</a>
      <button class="navbar-link" id="gamesMenuBtn"><i class="fas fa-gamepad"></i> Single Player Games</button>
      <button class="navbar-link" id="multiplayerGamesBtn"><i class="fas fa-user-group"></i> Multiplayer Games</button>
      {% endif %}
      <a href="/manage-collections" class="navbar-link"><i class="fas fa-cog"></i> Manage</a>
      <button id="themeToggle" class="navbar-theme-toggle" type="button"><i class="fas fa-moon"></i></button>
    </div>
  </div>
</nav>

<div id="ovContainer">
  <div class="ov-content">

    <div class="ov-title-bar">
      <h1 class="ov-title"><i class="fas fa-dharmachakra"></i> Orbiting Vault</h1>
      <p class="ov-subtitle">Spot the matching frame as it swings around the vault — three mistakes seals the vault!</p>
    </div>

    <!-- HUD: target card + stats -->
    <div class="ov-hud">
      <div class="ov-target-panel">
        <span class="ov-target-label">TARGET</span>
        <div class="ov-target-frame" id="ovTargetFrame">
          <img id="ovTargetImg" src="" alt="">
        </div>
        <span class="ov-target-sub">Find &amp; click</span>
      </div>
      <div class="ov-stats">
        <div class="stat-item"><span class="stat-label">Score</span><span class="stat-value" id="ovScore">0</span></div>
        <div class="stat-item"><span class="stat-label">Time</span><span class="stat-value"><span id="ovTimer">0</span>s</span></div>
        <div class="stat-item"><span class="stat-label">Lives</span><span class="stat-value" id="ovLives">❤️❤️❤️</span></div>
        <div class="stat-item"><span class="stat-label">Combo</span><span class="stat-value ov-combo" id="ovCombo">×1</span></div>
      </div>
    </div>

    <!-- Message -->
    <div id="ovMessage" class="ov-message"></div>

    <!-- 3D canvas area -->
    <div class="ov-canvas-wrap" id="ovCanvasWrap">
      <!-- renderer.domElement injected by JS -->

      <!-- Floating score texts (HTML divs projected from 3D world) -->
      <div class="ov-floats-layer" id="ovFloatsLayer"></div>

      <!-- Screen-flash overlay (wrong click = red, correct = gold) -->
      <div class="ov-flash" id="ovFlash"></div>
    </div>

    <!-- Controls -->
    <div class="ov-controls">
      <button id="startOvBtn"      class="control-btn primary"><i class="fas fa-play"></i> Start</button>
      <button id="resetOvBtn"      class="control-btn secondary" style="display:none"><i class="fas fa-redo"></i> Reset</button>
      <button id="fullscreenOvBtn" class="control-btn secondary"><i class="fas fa-expand"></i> Fullscreen</button>
      <button id="backOvBtn"       class="control-btn secondary"><i class="fas fa-arrow-left"></i> Back</button>
    </div>

    <!-- Settings -->
    <div class="ov-settings">
      <div class="settings-group">
        <label>Revolve speed:</label>
        <div class="ov-mode-toggle">
          <button type="button" class="ov-mode-btn active" data-mode="progressive">Speeds Up</button>
          <button type="button" class="ov-mode-btn" data-mode="constant">Constant</button>
        </div>
      </div>
      <div class="settings-group ov-slider-group">
        <label for="ovSpeed">
          <span id="ovSpeedLabel">Starting speed</span>: <strong id="ovSpeedVal">0.30</strong>
          <span class="slider-sub">(progressive mode speeds up further with every hit)</span>
        </label>
        <input type="range" id="ovSpeed" class="setting-slider" min="0.15" max="0.80" step="0.05" value="0.30">
        <div class="slider-hints"><span>slow</span><span>fast</span></div>
      </div>
      <div class="settings-group">
        <label>Username:</label>
        <input type="text" id="ovUsername" class="setting-input" placeholder="Anonymous" maxlength="20">
      </div>
    </div>

  </div>
</div>

<div id="gamesModal" class="games-modal">
  <div class="games-modal-content">
    <div class="games-modal-header">
      <h2><i class="fas fa-gamepad"></i> Choose a Game</h2>
      <button class="games-modal-close" id="gamesModalClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="games-grid" id="gamesGrid"></div>
  </div>
</div>

<script>const CURRENT_COLLECTION = "{{ collection }}";</script>
<script src="{{ url_for('static', filename='js/navbar-collections.js') }}"></script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/orbitingvault.js') }}"></script>
<script src="{{ url_for('static', filename='js/games-modal.js') }}"></script>
</body>
</html>
