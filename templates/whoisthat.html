<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>Who's That?{% if collection %} - {{ collection }}{% endif %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/svg+xml"  href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        (function(){var t=null;try{t=localStorage.getItem('imgur.theme')}catch(e){}
        if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}
        if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.documentElement.style.colorScheme='dark';}
        else{document.documentElement.removeAttribute('data-theme');document.documentElement.style.colorScheme='light';}})();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar">
  <div class="navbar-container">
    <a href="/" class="navbar-brand"><i class="fas fa-images"></i><span>ImgurMemory</span></a>
    <div class="navbar-menu">
      <a href="/" class="navbar-link"><i class="fas fa-home"></i> Home</a>
      <div class="navbar-dropdown">
        <button class="navbar-link navbar-dropdown-toggle"><i class="fas fa-folder-open"></i> View Collections <i class="fas fa-caret-down"></i></button>
        <div class="navbar-dropdown-menu" id="collectionsDropdown"></div>
      </div>
      <a href="/tags" class="navbar-link"><i class="fas fa-tags"></i> Browse Tags</a>
      {% if collection %}
      <a href="/collection/{{ collection }}" class="navbar-link"><i class="fas fa-images"></i> Gallery</a>
      <button class="navbar-link" id="gamesMenuBtn"><i class="fas fa-gamepad"></i> Games</button>
      {% endif %}
      <a href="/manage-collections" class="navbar-link"><i class="fas fa-cog"></i> Manage</a>
      <button id="themeToggle" class="navbar-theme-toggle" type="button"><i class="fas fa-moon"></i></button>
    </div>
  </div>
</nav>

<div id="wtContainer">
  <div class="wt-content">

    <div class="wt-title-bar">
      <h1 class="wt-title"><i class="fas fa-masks-theater"></i> Who's That?</h1>
      <p class="wt-subtitle">Tags are shown — no image. Which one in the lineup has <em>all</em> those tags?</p>
    </div>

    <div class="wt-stats">
      <div class="stat-item"><span class="stat-label">Score</span><span class="stat-value" id="wtScore">0</span></div>
      <div class="stat-item"><span class="stat-label">Round</span><span class="stat-value" id="wtRound">0</span></div>
      <div class="stat-item"><span class="stat-label">Lives</span><span class="stat-value" id="wtLives">❤️❤️❤️</span></div>
      <div class="stat-item"><span class="stat-label">Streak</span><span class="stat-value" id="wtStreak">0</span></div>
    </div>

    <div id="wtMessage" class="wt-message">
      <p style="color:var(--muted-text);font-style:italic;">Press <strong>Start Game</strong> — know your collection!</p>
    </div>

    <!-- Tag clue display -->
    <div class="wt-clue-stage" id="wtClueStage">
      <div class="wt-clue-header">
        <i class="fas fa-tags"></i> This image has these tags:
      </div>
      <div class="wt-tags-display" id="wtTagsDisplay"></div>
      <div class="wt-timer-track">
        <div class="wt-timer-fill" id="wtTimerFill"></div>
      </div>
    </div>

    <!-- Lineup grid -->
    <div class="wt-lineup" id="wtLineup"></div>

    <div class="wt-controls">
      <button id="startWtBtn" class="control-btn primary"><i class="fas fa-play"></i> Start Game</button>
      <button id="resetWtBtn" class="control-btn secondary" style="display:none;"><i class="fas fa-redo"></i> Reset</button>
      <button id="backWtBtn"  class="control-btn secondary"><i class="fas fa-arrow-left"></i> Back</button>
    </div>

    <div class="wt-settings">
      <div class="settings-group">
        <label>Tags shown:</label>
        <select id="wtTagCount" class="setting-select">
          <option value="2">2 tags (hardest)</option>
          <option value="3" selected>3 tags</option>
          <option value="4">4 tags (easier)</option>
          <option value="5">5 tags (easiest)</option>
        </select>
      </div>
      <div class="settings-group">
        <label>Time per round:</label>
        <select id="wtTimeLimit" class="setting-select">
          <option value="0">No limit</option>
          <option value="10000">10 seconds</option>
          <option value="7000" selected>7 seconds</option>
          <option value="5000">5 seconds</option>
        </select>
      </div>
      <div class="settings-group">
        <label>Username:</label>
        <input type="text" id="wtUsername" class="setting-input" placeholder="Anonymous" maxlength="20">
      </div>
    </div>

  </div>
</div>

<div id="gamesModal" class="games-modal">
  <div class="games-modal-content">
    <div class="games-modal-header">
      <h2><i class="fas fa-gamepad"></i> Choose a Game</h2>
      <button class="games-modal-close" id="gamesModalClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="games-grid" id="gamesGrid"></div>
  </div>
</div>

<script>const CURRENT_COLLECTION = "{{ collection }}";</script>
<script src="{{ url_for('static', filename='js/navbar-collections.js') }}"></script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/whoisthat.js') }}"></script>
<script src="{{ url_for('static', filename='js/games-modal.js') }}"></script>
</body>
</html>
