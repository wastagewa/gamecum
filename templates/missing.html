<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>Missing Piece{% if collection %} - {{ collection }}{% endif %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon-16.png') }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        (function(){
            var theme = null;
            try { theme = localStorage.getItem('imgur.theme'); } catch(e) {}
            if(!theme){
                var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                theme = prefersDark ? 'dark' : 'light';
            }
            if(theme === 'dark'){
                document.documentElement.setAttribute('data-theme','dark');
                document.documentElement.style.colorScheme = 'dark';
            } else {
                document.documentElement.removeAttribute('data-theme');
                document.documentElement.style.colorScheme = 'light';
            }
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .missing-shell { max-width: 1260px; margin: 0 auto; padding: 24px; --missing-board-size: 150px; --missing-choice-size: 120px; }
        .missing-shell.fullscreen { max-width: none; min-height: 100vh; padding: 20px; }
        .missing-header { text-align: center; margin-bottom: 20px; }
        .missing-header p { color: var(--muted-text); margin-top: 8px; }
        .missing-toolbar, .missing-stats, .missing-options { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: center; }
        .missing-toolbar { margin-bottom: 18px; }
        .missing-panel { background: var(--surface-color); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 20px; box-shadow: 0 14px 34px rgba(0,0,0,0.18); }
        .missing-stats { margin-bottom: 18px; }
        .missing-board { display: grid; gap: 14px; justify-content: center; margin-bottom: 20px; }
        .missing-tile { width: var(--missing-board-size); height: var(--missing-board-size); border-radius: 16px; overflow: hidden; background: rgba(255,255,255,0.06); border: 2px solid transparent; }
        .missing-tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .missing-tile.gone { display: flex; align-items: center; justify-content: center; border-style: dashed; border-color: rgba(255,255,255,0.18); color: var(--muted-text); font-size: 2rem; background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(0,0,0,0.16)); }
        .missing-choice { width: var(--missing-choice-size); height: var(--missing-choice-size); padding: 0; border-radius: 16px; border: 2px solid rgba(255,255,255,0.12); background: transparent; overflow: hidden; cursor: pointer; transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease; }
        .missing-choice:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(0,0,0,0.18); }
        .missing-choice img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .missing-choice.correct { border-color: #2ecc71; box-shadow: 0 0 0 4px rgba(46,204,113,0.16); }
        .missing-choice.incorrect { border-color: #ff6b81; box-shadow: 0 0 0 4px rgba(255,107,129,0.2); }
        .missing-message { min-height: 28px; text-align: center; font-weight: 600; margin-bottom: 18px; }
        .missing-select, .missing-input { padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.16); background: var(--surface-color); color: var(--text-color); }
        .missing-range-wrap { display: flex; align-items: center; gap: 8px; }
        .missing-range-wrap input[type="range"] { width: 120px; }
        @media (max-width: 640px) {
            .missing-shell { padding: 16px; }
            .missing-range-wrap input[type="range"] { width: 90px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-brand">
                <i class="fas fa-images"></i>
                <span>ImgurMemory</span>
            </a>
            <div class="navbar-menu">
                <a href="/" class="navbar-link"><i class="fas fa-home"></i> Home</a>
                <div class="navbar-dropdown">
                    <button class="navbar-link navbar-dropdown-toggle"><i class="fas fa-folder-open"></i> View Collections <i class="fas fa-caret-down"></i></button>
                    <div class="navbar-dropdown-menu" id="collectionsDropdown"></div>
                </div>
                {% if collection %}
                <a href="/collection/{{ collection }}" class="navbar-link"><i class="fas fa-images"></i> Gallery</a>
                <button class="navbar-link" id="gamesMenuBtn"><i class="fas fa-gamepad"></i> Games</button>
                {% endif %}
                <button id="themeToggle" class="navbar-theme-toggle" type="button"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <main class="missing-shell">
        <header class="missing-header">
            <h1><i class="fas fa-eye-slash"></i> Missing Piece</h1>
            <p>Study the grid, then pick which image vanished from the collection layout.</p>
        </header>

        <div class="missing-toolbar">
            <label>Grid
                <select id="missingGridSize" class="missing-select">
                    <option value="4">2x2</option>
                    <option value="6" selected>2x3</option>
                    <option value="9">3x3</option>
                </select>
            </label>
            <label>Preview
                <select id="missingPreview" class="missing-select">
                    <option value="2500">Quick</option>
                    <option value="4000" selected>Normal</option>
                    <option value="6000">Relaxed</option>
                </select>
            </label>
            <label>Choices
                <select id="missingChoiceCount" class="missing-select">
                    <option value="3">3</option>
                    <option value="4" selected>4</option>
                    <option value="5">5</option>
                </select>
            </label>
            <label>Player
                <input id="missingUsername" class="missing-input" type="text" maxlength="30" placeholder="Anonymous">
            </label>
            <label class="missing-range-wrap">Board
                <input id="missingBoardSize" type="range" min="80" max="240" step="10" value="150">
                <span id="missingBoardSizeLabel">150px</span>
            </label>
            <label class="missing-range-wrap">Choices
                <input id="missingChoiceSize" type="range" min="70" max="200" step="10" value="120">
                <span id="missingChoiceSizeLabel">120px</span>
            </label>
            <button id="startMissingBtn" class="btn btn-primary"><i class="fas fa-play"></i> Start</button>
            <button id="resetMissingBtn" class="btn btn-secondary"><i class="fas fa-redo"></i> Reset</button>
            <button id="fullscreenMissingBtn" class="btn btn-secondary"><i class="fas fa-expand"></i> Fullscreen</button>
            <button id="backMissingBtn" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back</button>
        </div>

        <section class="missing-panel">
            <div class="missing-stats">
                <div class="stat-item"><span class="stat-label">Score:</span> <span id="missingScore" class="stat-value">0</span></div>
                <div class="stat-item"><span class="stat-label">Round:</span> <span id="missingRound" class="stat-value">0</span></div>
                <div class="stat-item"><span class="stat-label">Time:</span> <span id="missingTime" class="stat-value">0:00</span></div>
                <div class="stat-item"><span class="stat-label">State:</span> <span id="missingState" class="stat-value">Waiting</span></div>
            </div>

            <div id="missingMessage" class="missing-message"></div>
            <div id="missingBoard" class="missing-board"></div>
            <div id="missingOptions" class="missing-options"></div>
        </section>
    </main>

    <script>
        const MISSING_IMAGES = {{ images | tojson | safe }};
        const CURRENT_COLLECTION = "{{ collection }}";
    </script>
    <script src="{{ url_for('static', filename='js/navbar-collections.js') }}"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/missing.js') }}"></script>

    <div id="gamesModal" class="games-modal">
        <div class="games-modal-content">
            <div class="games-modal-header">
                <h2><i class="fas fa-gamepad"></i> Choose a Game</h2>
                <button class="games-modal-close" id="gamesModalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="games-grid" id="gamesGrid"></div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/games-modal.js') }}"></script>
</body>
</html>
