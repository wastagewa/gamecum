<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>Heat Map{% if collection %} - {{ collection }}{% endif %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/svg+xml"  href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        (function(){var t=null;try{t=localStorage.getItem('imgur.theme')}catch(e){}
        if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}
        if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.documentElement.style.colorScheme='dark';}
        else{document.documentElement.removeAttribute('data-theme');document.documentElement.style.colorScheme='light';}})();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar">
  <div class="navbar-container">
    <a href="/" class="navbar-brand"><i class="fas fa-images"></i><span>ImgurMemory</span></a>
    <div class="navbar-menu">
      <a href="/" class="navbar-link"><i class="fas fa-home"></i> Home</a>
      <div class="navbar-dropdown">
        <button class="navbar-link navbar-dropdown-toggle"><i class="fas fa-folder-open"></i> View Collections <i class="fas fa-caret-down"></i></button>
        <div class="navbar-dropdown-menu" id="collectionsDropdown"></div>
      </div>
      <a href="/tags" class="navbar-link"><i class="fas fa-tags"></i> Browse Tags</a>
      {% if collection %}
      <a href="/collection/{{ collection }}" class="navbar-link"><i class="fas fa-images"></i> Gallery</a>
      <button class="navbar-link" id="gamesMenuBtn"><i class="fas fa-gamepad"></i> Single Player Games</button>
      <button class="navbar-link" id="multiplayerGamesBtn"><i class="fas fa-user-group"></i> Multiplayer Games</button>
      {% endif %}
      <a href="/manage-collections" class="navbar-link"><i class="fas fa-cog"></i> Manage</a>
      <button id="themeToggle" class="navbar-theme-toggle" type="button"><i class="fas fa-moon"></i></button>
    </div>
  </div>
</nav>

<div id="hmContainer">
  <div class="hm-content">

    <div class="hm-title-bar">
      <h1 class="hm-title"><i class="fas fa-fire"></i> Heat Map</h1>
      <p class="hm-subtitle">Hold and drag to paint what draws your eye — hotter zones mean more attention!</p>
    </div>

    <!-- Stats -->
    <div class="hm-stats">
      <div class="stat-item">
        <span class="stat-label">Image</span>
        <span class="stat-value"><span id="hmRound">0</span> / <span id="hmTotal">—</span></span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Time</span>
        <span class="stat-value"><span id="hmTimer">30</span>s</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Coverage</span>
        <span class="stat-value" id="hmCoverage" style="color:var(--secondary-color)">0%</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Score</span>
        <span class="stat-value" id="hmScore">0</span>
      </div>
    </div>

    <!-- Message -->
    <div id="hmMessage" class="hm-message"></div>

    <!-- Stage: image + canvas overlay -->
    <div class="hm-stage" id="hmStage">
      <img id="hmImg" class="hm-img" src="" alt="">
      <canvas id="hmCanvas" class="hm-canvas"></canvas>
      <!-- Countdown ring drawn around the border -->
      <div class="hm-timer-bar-wrap">
        <div class="hm-timer-bar" id="hmTimerBar"></div>
      </div>
    </div>

    <!-- Controls -->
    <div class="hm-controls">
      <button id="startHmBtn"      class="control-btn primary"><i class="fas fa-play"></i> Start</button>
      <button id="nextHmBtn"       class="control-btn secondary" style="display:none"><i class="fas fa-forward"></i> Next Image</button>
      <button id="resetHmBtn"      class="control-btn secondary" style="display:none"><i class="fas fa-redo"></i> Reset</button>
      <button id="fullscreenHmBtn" class="control-btn secondary"><i class="fas fa-expand"></i> Fullscreen</button>
      <button id="backHmBtn"       class="control-btn secondary"><i class="fas fa-arrow-left"></i> Back</button>
    </div>

    <!-- Settings -->
    <div class="hm-settings">
      <div class="settings-group hm-slider-group">
        <label for="hmTimeLimit">
          Time per image: <strong id="hmTimeLimitVal">30</strong>s
          <span class="slider-sub">(shorter = harder)</span>
        </label>
        <input type="range" id="hmTimeLimit" class="setting-slider" min="10" max="120" step="5" value="30">
        <div class="slider-hints"><span>10s fast</span><span>120s slow</span></div>
      </div>
      <div class="settings-group hm-slider-group">
        <label for="hmBrush">
          Brush: <strong id="hmBrushVal">60</strong>px
          <span class="slider-sub">(larger = broader strokes)</span>
        </label>
        <input type="range" id="hmBrush" class="setting-slider" min="20" max="120" step="10" value="60">
        <div class="slider-hints"><span>20 fine</span><span>120 broad</span></div>
      </div>
      <div class="settings-group">
        <label>Username:</label>
        <input type="text" id="hmUsername" class="setting-input" placeholder="Anonymous" maxlength="20">
      </div>
    </div>

  </div>
</div>

<div id="gamesModal" class="games-modal">
  <div class="games-modal-content">
    <div class="games-modal-header">
      <h2><i class="fas fa-gamepad"></i> Choose a Game</h2>
      <button class="games-modal-close" id="gamesModalClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="games-grid" id="gamesGrid"></div>
  </div>
</div>

<script>const CURRENT_COLLECTION = "{{ collection }}";</script>
<script src="{{ url_for('static', filename='js/navbar-collections.js') }}"></script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/heatmap.js') }}"></script>
<script src="{{ url_for('static', filename='js/games-modal.js') }}"></script>
</body>
</html>
