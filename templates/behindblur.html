<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>Behind the Blur{% if collection %} - {{ collection }}{% endif %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/svg+xml"  href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        (function(){var t=null;try{t=localStorage.getItem('imgur.theme')}catch(e){}
        if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}
        if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.documentElement.style.colorScheme='dark';}
        else{document.documentElement.removeAttribute('data-theme');document.documentElement.style.colorScheme='light';}})();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar">
  <div class="navbar-container">
    <a href="/" class="navbar-brand"><i class="fas fa-images"></i><span>ImgurMemory</span></a>
    <div class="navbar-menu">
      <a href="/" class="navbar-link"><i class="fas fa-home"></i> Home</a>
      <div class="navbar-dropdown">
        <button class="navbar-link navbar-dropdown-toggle"><i class="fas fa-folder-open"></i> View Collections <i class="fas fa-caret-down"></i></button>
        <div class="navbar-dropdown-menu" id="collectionsDropdown"></div>
      </div>
      <a href="/tags" class="navbar-link"><i class="fas fa-tags"></i> Browse Tags</a>
      {% if collection %}
      <a href="/collection/{{ collection }}" class="navbar-link"><i class="fas fa-images"></i> Gallery</a>
      <button class="navbar-link" id="gamesMenuBtn"><i class="fas fa-gamepad"></i> Games</button>
      {% endif %}
      <a href="/manage-collections" class="navbar-link"><i class="fas fa-cog"></i> Manage</a>
      <button id="themeToggle" class="navbar-theme-toggle" type="button"><i class="fas fa-moon"></i></button>
    </div>
  </div>
</nav>

<div id="bbContainer">
  <div class="bb-content">

    <div class="bb-title-bar">
      <h1 class="bb-title"><i class="fas fa-eye"></i> Behind the Blur</h1>
      <p class="bb-subtitle">The fog lifts slowly — identify the image before it's crystal clear!</p>
    </div>

    <!-- Stats -->
    <div class="bb-stats">
      <div class="stat-item"><span class="stat-label">Score</span><span class="stat-value" id="bbScore">0</span></div>
      <div class="stat-item"><span class="stat-label">Round</span><span class="stat-value" id="bbRound">0</span></div>
      <div class="stat-item"><span class="stat-label">Lives</span><span class="stat-value" id="bbLives">❤️❤️❤️</span></div>
      <div class="stat-item"><span class="stat-label">Bonus</span><span class="stat-value" id="bbBonus" style="color:var(--secondary-color)">MAX</span></div>
    </div>

    <!-- Message -->
    <div id="bbMessage" class="bb-message">
      <p style="color:var(--muted-text);font-style:italic;">Press <strong>Start Game</strong> to begin</p>
    </div>

    <!-- Stage -->
    <div class="bb-stage-wrap">
      <div class="bb-stage" id="bbStage">
        <img id="bbTargetImg" class="bb-target-img" src="" alt="">
      </div>
    </div>

    <!-- Clarity bar -->
    <div class="bb-clarity-row">
      <span class="bb-clarity-label"><i class="fas fa-glasses"></i> Clarity:</span>
      <div class="bb-clarity-track"><div id="bbClarityBar" class="bb-clarity-fill"></div></div>
      <span id="bbClarityPct" class="bb-clarity-pct">0%</span>
    </div>

    <!-- 4 option thumbnails -->
    <div class="bb-options" id="bbOptions"></div>

    <!-- Controls -->
    <div class="bb-controls">
      <button id="startBbBtn"      class="control-btn primary"><i class="fas fa-play"></i> Start Game</button>
      <button id="resetBbBtn"      class="control-btn secondary" style="display:none;"><i class="fas fa-redo"></i> Reset</button>
      <button id="fullscreenBbBtn" class="control-btn secondary"><i class="fas fa-expand"></i> Fullscreen</button>
      <button id="backBbBtn"       class="control-btn secondary"><i class="fas fa-arrow-left"></i> Back</button>
    </div>

    <!-- Settings -->
    <div class="bb-settings">
      <div class="settings-group bb-slider-group">
        <label for="bbClearTime">
          Clear time: <strong id="bbClearTimeVal">20s</strong>
          <span class="slider-sub">(shorter = harder)</span>
        </label>
        <input type="range" id="bbClearTime" class="setting-slider" min="5" max="60" step="5" value="20">
        <div class="slider-hints"><span>5s fast</span><span>60s slow</span></div>
      </div>
      <div class="settings-group">
        <label>Username:</label>
        <input type="text" id="bbUsername" class="setting-input" placeholder="Anonymous" maxlength="20">
      </div>
    </div>

  </div>
</div>

<div id="gamesModal" class="games-modal">
  <div class="games-modal-content">
    <div class="games-modal-header">
      <h2><i class="fas fa-gamepad"></i> Choose a Game</h2>
      <button class="games-modal-close" id="gamesModalClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="games-grid" id="gamesGrid"></div>
  </div>
</div>

<script>const CURRENT_COLLECTION = "{{ collection }}";</script>
<script src="{{ url_for('static', filename='js/navbar-collections.js') }}"></script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/behindblur.js') }}"></script>
<script src="{{ url_for('static', filename='js/games-modal.js') }}"></script>
</body>
</html>
