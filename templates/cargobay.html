<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>Zero-Gravity Cargo Bay{% if collection %} - {{ collection }}{% endif %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/svg+xml"  href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        (function(){var t=null;try{t=localStorage.getItem('imgur.theme')}catch(e){}
        if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}
        if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.documentElement.style.colorScheme='dark';}
        else{document.documentElement.removeAttribute('data-theme');document.documentElement.style.colorScheme='light';}})();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Three.js r134 — stable global THREE object -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>
<body>
<nav class="navbar">
  <div class="navbar-container">
    <a href="/" class="navbar-brand"><i class="fas fa-images"></i><span>ImgurMemory</span></a>
    <div class="navbar-menu">
      <a href="/" class="navbar-link"><i class="fas fa-home"></i> Home</a>
      <div class="navbar-dropdown">
        <button class="navbar-link navbar-dropdown-toggle"><i class="fas fa-folder-open"></i> View Collections <i class="fas fa-caret-down"></i></button>
        <div class="navbar-dropdown-menu" id="collectionsDropdown"></div>
      </div>
      <a href="/tags" class="navbar-link"><i class="fas fa-tags"></i> Browse Tags</a>
      {% if collection %}
      <a href="/collection/{{ collection }}" class="navbar-link"><i class="fas fa-images"></i> Gallery</a>
      <button class="navbar-link" id="gamesMenuBtn"><i class="fas fa-gamepad"></i> Single Player Games</button>
      <button class="navbar-link" id="multiplayerGamesBtn"><i class="fas fa-user-group"></i> Multiplayer Games</button>
      {% endif %}
      <a href="/manage-collections" class="navbar-link"><i class="fas fa-cog"></i> Manage</a>
      <button id="themeToggle" class="navbar-theme-toggle" type="button"><i class="fas fa-moon"></i></button>
    </div>
  </div>
</nav>

<div id="cbContainer">
  <div class="cb-content">

    <div class="cb-title-bar">
      <h1 class="cb-title"><i class="fas fa-satellite"></i> Zero-Gravity Cargo Bay</h1>
      <p class="cb-subtitle">Tractor-beam the crate matching the target before it drifts into the airlock — three mistakes and the bay locks down!</p>
    </div>

    <!-- HUD: target card + stats -->
    <div class="cb-hud">
      <div class="cb-target-panel">
        <span class="cb-target-label">TARGET</span>
        <div class="cb-target-frame" id="cbTargetFrame">
          <img id="cbTargetImg" src="" alt="">
        </div>
        <span class="cb-target-sub">Find &amp; beam</span>
      </div>
      <div class="cb-stats">
        <div class="stat-item"><span class="stat-label">Score</span><span class="stat-value" id="cbScore">0</span></div>
        <div class="stat-item"><span class="stat-label">Time</span><span class="stat-value"><span id="cbTimer">0</span>s</span></div>
        <div class="stat-item"><span class="stat-label">Lives</span><span class="stat-value" id="cbLives">❤️❤️❤️</span></div>
        <div class="stat-item"><span class="stat-label">Combo</span><span class="stat-value cb-combo" id="cbCombo">×1</span></div>
      </div>
    </div>

    <!-- Message -->
    <div id="cbMessage" class="cb-message"></div>

    <!-- 3D canvas area -->
    <div class="cb-canvas-wrap" id="cbCanvasWrap">
      <!-- renderer.domElement injected by JS -->

      <!-- Floating score texts (HTML divs projected from 3D world) -->
      <div class="cb-floats-layer" id="cbFloatsLayer"></div>

      <!-- Screen-flash overlay (wrong beam = red, correct = cyan) -->
      <div class="cb-flash" id="cbFlash"></div>
    </div>

    <!-- Controls -->
    <div class="cb-controls">
      <button id="startCbBtn"      class="control-btn primary"><i class="fas fa-play"></i> Start</button>
      <button id="resetCbBtn"      class="control-btn secondary" style="display:none"><i class="fas fa-redo"></i> Reset</button>
      <button id="fullscreenCbBtn" class="control-btn secondary"><i class="fas fa-expand"></i> Fullscreen</button>
      <button id="backCbBtn"       class="control-btn secondary"><i class="fas fa-arrow-left"></i> Back</button>
    </div>

    <!-- Settings -->
    <div class="cb-settings">
      <div class="settings-group">
        <label>Username:</label>
        <input type="text" id="cbUsername" class="setting-input" placeholder="Anonymous" maxlength="20">
      </div>
    </div>

  </div>
</div>

<div id="gamesModal" class="games-modal">
  <div class="games-modal-content">
    <div class="games-modal-header">
      <h2><i class="fas fa-gamepad"></i> Choose a Game</h2>
      <button class="games-modal-close" id="gamesModalClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="games-grid" id="gamesGrid"></div>
  </div>
</div>

<script>const CURRENT_COLLECTION = "{{ collection }}";</script>
<script src="{{ url_for('static', filename='js/navbar-collections.js') }}"></script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/cargobay.js') }}"></script>
<script src="{{ url_for('static', filename='js/games-modal.js') }}"></script>
</body>
</html>
