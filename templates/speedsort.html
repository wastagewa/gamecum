<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>Speed Sort{% if collection %} - {{ collection }}{% endif %}</title>

    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.png') }}">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        (function(){
            var theme = null;
            try { theme = localStorage.getItem('imgur.theme'); } catch(e) {}
            if(!theme){ var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches; theme = prefersDark ? 'dark' : 'light'; }
            if(theme === 'dark'){ document.documentElement.setAttribute('data-theme','dark'); document.documentElement.style.colorScheme = 'dark'; }
            else { document.documentElement.removeAttribute('data-theme'); document.documentElement.style.colorScheme = 'light'; }
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-brand"><i class="fas fa-images"></i><span>ImgurMemory</span></a>
            <div class="navbar-menu">
                <a href="/" class="navbar-link"><i class="fas fa-home"></i> Home</a>
                <div class="navbar-dropdown">
                    <button class="navbar-link navbar-dropdown-toggle"><i class="fas fa-folder-open"></i> View Collections <i class="fas fa-caret-down"></i></button>
                    <div class="navbar-dropdown-menu" id="collectionsDropdown"></div>
                </div>
                <a href="/tags" class="navbar-link"><i class="fas fa-tags"></i> Browse Tags</a>
                {% if collection %}
                <a href="/collection/{{ collection }}" class="navbar-link"><i class="fas fa-images"></i> Gallery</a>
                <button class="navbar-link" id="gamesMenuBtn"><i class="fas fa-gamepad"></i> Games</button>
                {% endif %}
                <a href="/manage-collections" class="navbar-link"><i class="fas fa-cog"></i> Manage</a>
                <button id="themeToggle" class="navbar-theme-toggle" type="button"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </nav>

    <div id="sortContainer">
        <div class="sort-content">

            <!-- Title -->
            <div class="sort-title-bar">
                <h1 class="sort-title"><i class="fas fa-bolt"></i> Speed Sort</h1>
                <p class="sort-subtitle">Does this image have the tag? Decide fast — before time runs out!</p>
            </div>

            <!-- Target tag display -->
            <div class="sort-target-area" id="sortTargetArea">
                <span class="sort-target-label">Sort tag:</span>
                <span id="sortTagDisplay" class="sort-tag-display">&nbsp;</span>
            </div>

            <!-- Stats -->
            <div class="sort-stats">
                <div class="stat-item">
                    <span class="stat-label">Score</span>
                    <span class="stat-value" id="sortScore">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Sorted</span>
                    <span class="stat-value" id="sortCount">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Combo</span>
                    <span class="stat-value" id="sortCombo">×1</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Lives</span>
                    <span class="stat-value" id="sortLives">❤️❤️❤️</span>
                </div>
            </div>

            <!-- Message -->
            <div id="sortMessage" class="sort-message"></div>

            <!-- Game area: current image + timer bar + YES/NO buttons -->
            <div class="sort-game-area" id="sortGameArea">
                <div class="sort-image-stage">
                    <img id="sortImage" class="sort-image" src="" alt="Sort this image">
                    <div class="sort-flash-overlay" id="sortFlashOverlay"></div>
                </div>

                <div class="sort-timer-track">
                    <div class="sort-timer-fill" id="sortTimerFill"></div>
                </div>

                <div class="sort-choice-row">
                    <button id="sortNoBtn" class="sort-choice-btn sort-no" disabled>
                        <i class="fas fa-times"></i>
                        <span>NO</span>
                        <kbd>←</kbd>
                    </button>
                    <div class="sort-choice-divider">or</div>
                    <button id="sortYesBtn" class="sort-choice-btn sort-yes" disabled>
                        <i class="fas fa-check"></i>
                        <span>YES</span>
                        <kbd>→</kbd>
                    </button>
                </div>
            </div>

            <!-- Controls -->
            <div class="sort-controls">
                <button id="startSortBtn" class="control-btn primary"><i class="fas fa-play"></i> Start Game</button>
                <button id="resetSortBtn" class="control-btn secondary" style="display:none;"><i class="fas fa-redo"></i> Reset</button>
                <button id="fullscreenSortBtn" class="control-btn secondary"><i class="fas fa-expand"></i> Fullscreen</button>
                <button id="backSortBtn" class="control-btn secondary"><i class="fas fa-arrow-left"></i> Back</button>
            </div>

            <!-- Settings -->
            <div class="sort-settings">
                <div class="settings-group sp-slider-group">
                    <label for="sortImageTime">
                        Time per image: <strong id="sortImageTimeVal">4s</strong>
                        <span class="slider-sub">(shorter = harder)</span>
                    </label>
                    <input type="range" id="sortImageTime" class="setting-slider" min="1" max="10" step="1" value="4">
                    <div class="slider-hints"><span>1s (insane)</span><span>10s (chill)</span></div>
                </div>
                <div class="settings-group">
                    <label for="sortRounds">Images per round:</label>
                    <select id="sortRounds" class="setting-select">
                        <option value="10">10</option>
                        <option value="20" selected>20</option>
                        <option value="30">30</option>
                        <option value="50">50</option>
                    </select>
                </div>
                <div class="settings-group">
                    <label for="sortUsernameInput">Username:</label>
                    <input type="text" id="sortUsernameInput" class="setting-input" placeholder="Anonymous" maxlength="20">
                </div>
            </div>

        </div>
    </div>

    <!-- Games Modal -->
    <div id="gamesModal" class="games-modal">
        <div class="games-modal-content">
            <div class="games-modal-header">
                <h2><i class="fas fa-gamepad"></i> Choose a Game</h2>
                <button class="games-modal-close" id="gamesModalClose"><i class="fas fa-times"></i></button>
            </div>
            <div class="games-grid" id="gamesGrid"></div>
        </div>
    </div>

    <script>
        const CURRENT_COLLECTION = "{{ collection }}";
    </script>
    <script src="{{ url_for('static', filename='js/navbar-collections.js') }}"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/speedsort.js') }}"></script>
    <script src="{{ url_for('static', filename='js/games-modal.js') }}"></script>
</body>
</html>
