<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark light">
    <title>Bubble Burst{% if collection %} - {{ collection }}{% endif %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/svg+xml"  href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        (function(){var t=null;try{t=localStorage.getItem('imgur.theme')}catch(e){}
        if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}
        if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.documentElement.style.colorScheme='dark';}
        else{document.documentElement.removeAttribute('data-theme');document.documentElement.style.colorScheme='light';}})();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar">
  <div class="navbar-container">
    <a href="/" class="navbar-brand"><i class="fas fa-images"></i><span>ImgurMemory</span></a>
    <div class="navbar-menu">
      <a href="/" class="navbar-link"><i class="fas fa-home"></i> Home</a>
      <div class="navbar-dropdown">
        <button class="navbar-link navbar-dropdown-toggle"><i class="fas fa-folder-open"></i> View Collections <i class="fas fa-caret-down"></i></button>
        <div class="navbar-dropdown-menu" id="collectionsDropdown"></div>
      </div>
      <a href="/tags" class="navbar-link"><i class="fas fa-tags"></i> Browse Tags</a>
      {% if collection %}
      <a href="/collection/{{ collection }}" class="navbar-link"><i class="fas fa-images"></i> Gallery</a>
      <button class="navbar-link" id="gamesMenuBtn"><i class="fas fa-gamepad"></i> Single Player Games</button>
      <button class="navbar-link" id="multiplayerGamesBtn"><i class="fas fa-user-group"></i> Multiplayer Games</button>
      {% endif %}
      <a href="/manage-collections" class="navbar-link"><i class="fas fa-cog"></i> Manage</a>
      <button id="themeToggle" class="navbar-theme-toggle" type="button"><i class="fas fa-moon"></i></button>
    </div>
  </div>
</nav>

<div id="bubContainer">
  <div class="bub-content">

    <div class="bub-title-bar">
      <h1 class="bub-title"><i class="fas fa-soap"></i> Bubble Burst</h1>
      <p class="bub-subtitle">Pop every bubble containing the target — avoid the decoys!</p>
    </div>

    <!-- HUD: target + stats side by side -->
    <div class="bub-hud">

      <!-- Target display -->
      <div class="bub-target-panel">
        <span class="bub-target-label">TARGET</span>
        <div class="bub-target-ring" id="bubTargetRing">
          <img id="bubTargetImg" src="" alt="">
        </div>
        <span class="bub-target-hint">Find this</span>
      </div>

      <!-- Stats -->
      <div class="bub-stats">
        <div class="stat-item"><span class="stat-label">Score</span><span class="stat-value" id="bubScore">0</span></div>
        <div class="stat-item"><span class="stat-label">Time</span><span class="stat-value"><span id="bubTimer">60</span>s</span></div>
        <div class="stat-item"><span class="stat-label">Lives</span><span class="stat-value" id="bubLives">❤️❤️❤️</span></div>
        <div class="stat-item"><span class="stat-label">Combo</span><span class="stat-value bub-combo" id="bubCombo">×1</span></div>
      </div>
    </div>

    <!-- Message -->
    <div id="bubMessage" class="bub-message"></div>

    <!-- Canvas — the bubble field -->
    <div class="bub-canvas-wrap">
      <canvas id="bubCanvas"></canvas>
    </div>

    <!-- Controls -->
    <div class="bub-controls">
      <button id="startBubBtn"      class="control-btn primary"><i class="fas fa-play"></i> Start</button>
      <button id="resetBubBtn"      class="control-btn secondary" style="display:none"><i class="fas fa-redo"></i> Reset</button>
      <button id="fullscreenBubBtn" class="control-btn secondary"><i class="fas fa-expand"></i> Fullscreen</button>
      <button id="backBubBtn"       class="control-btn secondary"><i class="fas fa-arrow-left"></i> Back</button>
    </div>

    <!-- Settings -->
    <div class="bub-settings">
      <div class="settings-group bub-slider-group">
        <label for="bubDuration">
          Game length: <strong id="bubDurationVal">60</strong>s
          <span class="slider-sub">(longer = higher potential score)</span>
        </label>
        <input type="range" id="bubDuration" class="setting-slider" min="30" max="120" step="15" value="60">
        <div class="slider-hints"><span>30s sprint</span><span>120s marathon</span></div>
      </div>
      <div class="settings-group">
        <label>Username:</label>
        <input type="text" id="bubUsername" class="setting-input" placeholder="Anonymous" maxlength="20">
      </div>
    </div>

  </div>
</div>

<div id="gamesModal" class="games-modal">
  <div class="games-modal-content">
    <div class="games-modal-header">
      <h2><i class="fas fa-gamepad"></i> Choose a Game</h2>
      <button class="games-modal-close" id="gamesModalClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="games-grid" id="gamesGrid"></div>
  </div>
</div>

<script>const CURRENT_COLLECTION = "{{ collection }}";</script>
<script src="{{ url_for('static', filename='js/navbar-collections.js') }}"></script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/bubbleburst.js') }}"></script>
<script src="{{ url_for('static', filename='js/games-modal.js') }}"></script>
</body>
</html>
